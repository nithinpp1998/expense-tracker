; PHP configuration for the expense-tracker container

[PHP]
; File upload limits
upload_max_filesize = 40M
post_max_size = 40M

; Execution limits
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; Error reporting (overridden by APP_DEBUG in Laravel)
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Date timezone
date.timezone = UTC

; OPcache settings (improves performance in production)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
