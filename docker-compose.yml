services:

  # ── PHP Application ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      # Exclude host node_modules / vendor from container
      - /var/www/node_modules
      - /var/www/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-expense_tracker}
      - DB_USERNAME=${DB_USERNAME:-expense_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    networks:
      - expense-tracker
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx Web Server ─────────────────────────────────────────────────────────
  webserver:
    image: nginx:1.25-alpine
    container_name: expense-tracker-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - expense-tracker
    depends_on:
      - app

  # ── MySQL Database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: expense-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-expense_tracker}
      MYSQL_USER: ${DB_USERNAME:-expense_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - expense-tracker
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  expense-tracker:
    driver: bridge

volumes:
  dbdata:
    driver: local
